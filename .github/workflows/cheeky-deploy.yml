# Cheeky OS — Deploy workflow
# Triggers Render deploy hook after successful build+test on main push.
name: Cheeky Deploy

on:
  push:
    branches: [main]
    paths:
      - 'email-intake/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy after build and test succeed
    needs: []  # Add job references if using reusable workflows

    steps:
      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "🚀 Triggering Render deploy…"
            curl -s -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo ""
            echo "✅ Deploy hook triggered"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK_URL not set — skipping deploy"
          fi

      - name: Deploy summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
