# Cheeky OS — Test workflow
# Runs Jest test suite on push and PR to main.
name: Cheeky Test

on:
  push:
    branches: [main]
    paths:
      - 'email-intake/**'
  pull_request:
    branches: [main]
    paths:
      - 'email-intake/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: email-intake

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: email-intake/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests --forceExit --verbose
        env:
          NODE_ENV: test
          BASE_URL: http://localhost:3001
