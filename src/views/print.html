<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Print Queue</title>
</head>
<body>

<h1>🔥 NEXT JOB</h1>
<div id="nextJob"></div>

<h1>Print Queue (Batch Mode)</h1>

<div id="queue"></div>

<script>
async function loadQueue() {
  const res = await fetch('/api/print/queue');
  const data = await res.json();

  const container = document.getElementById('queue');
  container.innerHTML = '';

  if (!data || !data.success || !Array.isArray(data.data)) {
    container.innerText = 'Failed to load print queue';
    return;
  }

  data.data.forEach(batch => {
    const div = document.createElement('div');

    div.innerHTML =
      "<h2>" + (batch.printType || "unknown") + " | " + (batch.color || "unknown") + "</h2>" +
      "<p>Total Qty: " + (batch.totalQty || 0) + "</p>";

    (batch.orders || []).forEach(o => {
      const item = document.createElement('div');
      item.innerText = "Order " + (o.orderId || "") + " - Qty: " + (o.qty || 0);
      div.appendChild(item);
    });

    container.appendChild(div);
  });
}

async function loadNext() {
  const res = await fetch('/api/print/next');
  const data = await res.json();

  if (!data || !data.success || !data.data) return;

  document.getElementById('nextJob').innerHTML =
    "Order: " + (data.data.id || "") +
    " | Priority: " + (data.data.score || 0);
}

loadNext();
loadQueue();
</script>

</body>
</html>
