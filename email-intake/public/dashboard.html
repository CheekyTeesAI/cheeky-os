<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cheeky OS Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
    h1 { text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; max-width: 1000px; margin: 0 auto 20px; }
    .card { background: #222; border-radius: 8px; padding: 12px; }
    .card h2 { margin: 0 0 8px; font-size: 14px; color: #888; }
    .num { font-size: 28px; font-weight: bold; color: #fff; }
    pre { background: #1a1a1a; padding: 10px; border-radius: 6px; overflow: auto; font-size: 11px; max-height: 280px; }
    .section { max-width: 1000px; margin: 0 auto 16px; }
    .cash-strip {
      max-width: 1000px; margin: 0 auto 16px; padding: 12px 16px;
      background: #1a2a1a; border-radius: 8px; border: 1px solid #333;
      display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
      font-size: 14px; color: #ccc;
    }
    .cash-strip strong { color: #8f8; }
  </style>
</head>
<body>
  <h1>CHEEKY OS COMMAND CENTER</h1>
  <div class="cash-strip" id="cash-strip">Loading cash metrics…</div>
  <div class="grid" id="metrics-grid"></div>
  <div class="section">
    <h2 style="font-size:14px;color:#888;">Orders (payment → production)</h2>
    <div class="grid" id="orders-metrics-grid"></div>
  </div>
  <div class="section">
    <h2 style="font-size:14px;color:#888;">Latest events</h2>
    <pre id="events-box">Loading…</pre>
  </div>
  <div class="section">
    <h2 style="font-size:14px;color:#888;">Latest intake</h2>
    <pre id="intake-box">Loading…</pre>
  </div>
  <p style="text-align:center;"><a href="/board.html" style="color:#8af;">Production board</a></p>
  <script src="/dashboard.js"></script>
</body>
</html>
