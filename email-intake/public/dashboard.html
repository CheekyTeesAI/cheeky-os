<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cheeky OS — Operations</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/components/ops-ui.css" />
  <link rel="stylesheet" href="/ops-dashboard.css" />
</head>
<body class="ops-app">
  <div class="ops-shell">
    <aside class="ops-sidebar" aria-label="Main navigation">
      <div class="brand-mini">
        <img src="/assets/logo.png" alt="" width="32" height="32" />
        <h1>Cheeky OS</h1>
      </div>
      <nav class="ops-nav">
        <a class="is-active" href="/dashboard">Operations</a>
        <a href="/operator">Operator</a>
        <a href="/staff-dashboard">Staff</a>
        <a href="/command-center">Command center</a>
      </nav>
    </aside>

    <div class="ops-main">
      <header class="ops-header">
        <div>
          <h2>Operations dashboard</h2>
          <p class="muted" style="margin: 0.25rem 0 0; font-size: 0.85rem;">
            Live data from deposit follow-ups, garment orders, and production queue
          </p>
        </div>
        <div class="ops-header-actions">
          <span class="status-inline">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text">Idle</span>
          </span>
          <button id="manual-refresh" type="button" class="ops-btn">Refresh</button>
        </div>
      </header>

      <div class="ops-body">
        <div id="kpi-row" class="ops-kpi-row"></div>

        <section>
          <h3 class="ops-panel-title">Active orders</h3>
          <div id="orders-table-wrap"></div>
        </section>
      </div>

      <footer class="ops-footer-hint">
        <span id="connection-status"></span>
        · Last updated: <span id="last-updated">Never</span>
        · Legacy list UI: <a href="/dashboard-classic.html">classic dashboard</a> (static copy)
      </footer>
    </div>
  </div>

  <div id="drawer-backdrop" class="ops-drawer-backdrop hidden" aria-hidden="true"></div>

  <aside id="detail-drawer" class="ops-drawer" aria-hidden="true" aria-label="Order detail">
    <div class="ops-drawer-header">
      <div>
        <h2 style="margin: 0; font-size: 1.05rem;">Order detail</h2>
        <p class="muted" style="margin: 0.35rem 0 0; font-size: 0.82rem;">UI-only checklist — no server writes</p>
      </div>
      <button type="button" id="drawer-close" class="ops-btn ops-btn-ghost" aria-label="Close panel">
        Close
      </button>
    </div>
    <div id="drawer-body" class="ops-drawer-body"></div>
  </aside>

  <script src="/components/ops-ui.js"></script>
  <script src="/ops-dashboard.js" defer></script>
</body>
</html>
