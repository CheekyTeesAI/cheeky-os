<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cheeky — Customer comms queue</title>
  <style>
    :root {
      --bg: #0e1218;
      --panel: #161d27;
      --border: #2a3544;
      --text: #e8edf4;
      --muted: #8b9aab;
      --accent: #3b9eff;
      --review: #eab308;
      --ok: #22c55e;
      --sent: #64748b;
      --err: #f43f5e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    .meta { color: var(--muted); font-size: 0.8rem; }
    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.secondary { background: #475569; }
    button.danger { background: var(--err); }
    button.ok { background: var(--ok); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    a.hdr { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    a.hdr:hover { text-decoration: underline; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 10px;
      padding: 12px;
      align-items: start;
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
    .col {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 160px;
      max-height: calc(100vh - 88px);
      display: flex;
      flex-direction: column;
    }
    .col h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .col.review h2 { color: var(--review); }
    .col.approved h2 { color: var(--ok); }
    .col.sent h2 { color: var(--sent); }
    .col.errors h2 { color: var(--err); }
    .list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .card {
      background: #121922;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.8rem;
    }
    .card .t { font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .card .sub { color: var(--muted); margin-bottom: 6px; font-size: 0.72rem; }
    .card pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      font-size: 0.78rem;
      color: #cbd5e1;
      max-height: 120px;
      overflow: hidden;
    }
    .row-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .banner {
      margin: 0 12px 12px;
      padding: 10px;
      border-radius: 6px;
      background: rgba(59, 158, 255, 0.12);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Customer comms queue</h1>
    <span class="meta" id="status">Draft-only — nothing sends until you approve and send.</span>
    <button type="button" id="refresh">Refresh</button>
    <a class="hdr" href="/fulfillment.html">Fulfillment</a>
    <a class="hdr" href="/sales.html">Sales queue</a>
    <a class="hdr" href="/production.html">Production</a>
  </header>
  <div class="banner">
    Outbound messages stay in <strong>Needs review</strong> until approved. Send runs only when Resend is configured (otherwise Send returns an error).
  </div>
  <main class="grid">
    <section class="col review">
      <h2>Needs review <span id="c-review"></span></h2>
      <div class="list" id="needs"></div>
    </section>
    <section class="col approved">
      <h2>Approved <span id="c-approved"></span></h2>
      <div class="list" id="approved"></div>
    </section>
    <section class="col sent">
      <h2>Sent <span id="c-sent"></span></h2>
      <div class="list" id="sent"></div>
    </section>
    <section class="col errors">
      <h2>Errors <span id="c-err"></span></h2>
      <div class="list" id="errors"></div>
    </section>
  </main>
  <script>
    (function () {
      var REFRESH_MS = 30000;
      function esc(s) {
        if (s == null) return "";
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function card(el, item, col) {
        var id = item.id || "";
        var div = document.createElement("div");
        div.className = "card";
        div.innerHTML =
          '<div class="t">' +
          esc(item.type || "?") +
          "</div>" +
          '<div class="sub">' +
          esc(item.customerName || "—") +
          " · " +
          esc(item.customerEmail || "") +
          "</div>" +
          '<div class="sub">' +
          esc(item.subject || "") +
          "</div>" +
          "<pre>" +
          esc(item.bodyPreview || item.body || "") +
          "</pre>";
        var btns = document.createElement("div");
        btns.className = "row-btns";
        if (col === "review") {
          var b1 = document.createElement("button");
          b1.type = "button";
          b1.textContent = "Approve";
          b1.addEventListener("click", function () {
            patch("/api/comms/" + encodeURIComponent(id) + "/approve", b1);
          });
          var b2 = document.createElement("button");
          b2.type = "button";
          b2.className = "secondary";
          b2.textContent = "Cancel";
          b2.addEventListener("click", function () {
            patch("/api/comms/" + encodeURIComponent(id) + "/cancel", b2);
          });
          btns.appendChild(b1);
          btns.appendChild(b2);
        }
        if (col === "approved") {
          var bs = document.createElement("button");
          bs.type = "button";
          bs.className = "ok";
          bs.textContent = "Send";
          bs.addEventListener("click", function () {
            postSend("/api/comms/" + encodeURIComponent(id) + "/send", bs);
          });
          var bc = document.createElement("button");
          bc.type = "button";
          bc.className = "secondary";
          bc.textContent = "Cancel";
          bc.addEventListener("click", function () {
            patch("/api/comms/" + encodeURIComponent(id) + "/cancel", bc);
          });
          btns.appendChild(bs);
          btns.appendChild(bc);
        }
        if (col === "errors") {
          var br = document.createElement("button");
          br.type = "button";
          br.textContent = "Approve (retry)";
          br.addEventListener("click", function () {
            patch("/api/comms/" + encodeURIComponent(id) + "/approve", br);
          });
          btns.appendChild(br);
        }
        div.appendChild(btns);
        el.appendChild(div);
      }
      function patch(url, btn) {
        if (btn) btn.disabled = true;
        fetch(url, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: "{}",
          credentials: "same-origin",
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, j: j };
            });
          })
          .then(function (x) {
            if (!x.ok || !x.j || x.j.ok !== true) {
              alert((x.j && x.j.error) || "Request failed");
            }
            load();
          })
          .catch(function () {
            alert("Network error");
          })
          .then(function () {
            if (btn) btn.disabled = false;
          });
      }
      function postSend(url, btn) {
        if (btn) btn.disabled = true;
        fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}",
          credentials: "same-origin",
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, j: j };
            });
          })
          .then(function (x) {
            if (!x.ok || !x.j || x.j.ok !== true) {
              alert((x.j && x.j.error) || "Send failed");
            }
            load();
          })
          .catch(function () {
            alert("Network error");
          })
          .then(function () {
            if (btn) btn.disabled = false;
          });
      }
      function clear(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }
      function load() {
        fetch("/api/comms/queue", { credentials: "same-origin" })
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            if (!j || j.ok !== true) throw new Error((j && j.error) || "bad_response");
            var n = document.getElementById("needs");
            var a = document.getElementById("approved");
            var s = document.getElementById("sent");
            var e = document.getElementById("errors");
            clear(n);
            clear(a);
            clear(s);
            clear(e);
            (j.needsApproval || []).forEach(function (it) {
              card(n, it, "review");
            });
            (j.readyToSend || []).forEach(function (it) {
              card(a, it, "approved");
            });
            (j.sent || []).forEach(function (it) {
              card(s, it, "sent");
            });
            (j.errors || []).forEach(function (it) {
              card(e, it, "errors");
            });
            document.getElementById("c-review").textContent =
              "(" + (j.needsApproval && j.needsApproval.length) + ")";
            document.getElementById("c-approved").textContent =
              "(" + (j.readyToSend && j.readyToSend.length) + ")";
            document.getElementById("c-sent").textContent =
              "(" + (j.sent && j.sent.length) + ")";
            document.getElementById("c-err").textContent =
              "(" + (j.errors && j.errors.length) + ")";
            document.getElementById("status").textContent =
              "Last updated " + new Date().toLocaleString();
          })
          .catch(function (e) {
            document.getElementById("status").textContent =
              "Error loading queue: " + (e && e.message ? e.message : String(e));
          });
      }
      document.getElementById("refresh").addEventListener("click", load);
      load();
      setInterval(load, REFRESH_MS);
    })();
  </script>
</body>
</html>
